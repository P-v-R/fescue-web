name: Release Please

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GH_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: staging

      # Auto-merge the version bump PR the moment CI passes on it.
      # This means you only ever manually merge one PR to ship to production.
      # Requires: repo Settings → General → "Allow auto-merge" enabled, and
      # branch protection on staging requiring the CI check to pass.
      - name: Enable auto-merge on release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh pr merge --auto --squash ${{ fromJson(steps.release.outputs.pr).number }}
