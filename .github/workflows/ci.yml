name: CI

on:
  push:
    branches:
      - staging
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - staging
      - main

jobs:
  ci:
    name: Type check, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Dummy values — sufficient for compilation. Real values are in Railway.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_SANITY_PROJECT_ID: placeholder
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: placeholder.myshopify.com
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN: placeholder
          NEXT_PUBLIC_APP_URL: https://placeholder.com
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: placeholder
          NEXT_PUBLIC_GOOGLE_MAPS_PLACE_ID: placeholder
          NEXT_PUBLIC_CLUB_ADDRESS: placeholder
          TZ: America/Los_Angeles
