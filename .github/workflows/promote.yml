name: Promote to Production

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write

jobs:
  open-production-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open staging → main PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"

          # Check if a PR already exists
          EXISTING=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — skipping."
            exit 0
          fi

          gh pr create \
            --base main \
            --head staging \
            --title "Deploy ${VERSION} to production" \
            --body "$(cat <<EOF
## Deploy ${VERSION} to production

This PR was automatically created by the [Promote to Production](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow after the ${VERSION} release tag was created on staging.

Merging this PR will deploy to production via Railway.

**Do not push directly to main — merge this PR to release.**
EOF
)"
