name: Promote to Production

on:
  push:
    tags:
      - 'fescue-web-v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to promote (e.g. fescue-web-v1.4.1)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  open-production-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Create deploy branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          DEPLOY_BRANCH="deploy/${VERSION}"

          # Skip if a PR for this version already exists
          EXISTING=$(gh pr list --base main --state open --json number,headRefName \
            --jq ".[] | select(.headRefName == \"${DEPLOY_BRANCH}\") | .number")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create deploy branch from main, merge staging in (staging wins on conflicts)
          git checkout -b "$DEPLOY_BRANCH" origin/main
          git merge origin/staging -X theirs --no-edit

          git push origin "$DEPLOY_BRANCH"

          gh pr create \
            --base main \
            --head "$DEPLOY_BRANCH" \
            --title "Deploy ${VERSION} to production" \
            --body "Merging this PR deploys ${VERSION} to production via Railway."
