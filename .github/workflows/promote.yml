name: Promote to Production

on:
  push:
    tags:
      - 'fescue-web-v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to promote (e.g. fescue-web-v1.4.1)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  open-production-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open staging → main PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          EXISTING=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, skipping."
            exit 0
          fi
          BODY="Merging this PR deploys ${VERSION} to production via Railway."
          gh pr create --base main --head staging --title "Deploy ${VERSION} to production" --body "$BODY"
